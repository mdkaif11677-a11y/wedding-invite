<!DOCTYPE html>
<html lang="en">
<head>

<title>Wedding Invitation</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<div class="particles">

<div class="slide">

      ROZY KHATOON <br>
      & <br>
      HANAL ALI
    </h1>
  </div>

    <p>With the blessings of Allah</p>
    <p>Invite you to their Nikah Ceremony</p>
  </div>

  <div class="slide">
    <h2>14 MAY 2026</h2>
    <p>DARGAH SHARIF , GOPALGANJ<br>
    <br>
    11:00AM
  </p>
  </div>

  <div class="slide">

  </div>

</div>

<script src="script.js"></script>

</html>
